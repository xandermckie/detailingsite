<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self'; img-src 'self' data:; connect-src 'self' https://detailingsite-production.up.railway.app;" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <title>Admin — 2 The Xtreme Detailing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>
  <svg style="display:none" xmlns="http://www.w3.org/2000/svg">
    <symbol id="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" fill="currentColor"/></symbol>
    <symbol id="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5" fill="currentColor"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
  </svg>

  <div class="wrap">
    <div id="loginView" class="login-form">
      <div class="header-bar" style="margin-bottom:1.5rem;">
        <div>
          <h1>Admin <span>Dashboard</span></h1>
          <p class="subtitle" style="margin-bottom:0;">2 The Xtreme Detailing — booking management</p>
        </div>
        <button class="theme-toggle" id="themeBtn" aria-label="Toggle light/dark mode" aria-pressed="false">
          <svg aria-hidden="true"><use href="#icon-moon"/></svg>
        </button>
      </div>
      <div class="card">
        <label for="apiKey">Admin API Key</label>
        <input type="password" id="apiKey" placeholder="Enter admin key" autocomplete="off" />
        <div class="error" id="loginError" style="display:none;"></div>
        <button class="btn" id="loginBtn" style="margin-top:1rem;width:100%;">Sign In</button>
      </div>
      <p style="margin-top:1rem;text-align:center;"><a href="/" class="back-link">&larr; Back to site</a></p>
    </div>

    <div id="dashboardView" style="display:none;">
      <div class="header-bar">
        <div>
          <h1>Bookings <span>Admin</span></h1>
          <p class="subtitle" style="margin-bottom:0;">Manage appointments and customer data</p>
        </div>
        <div class="header-actions">
          <button class="theme-toggle" id="themeBtnDash" aria-label="Toggle light/dark mode" aria-pressed="false">
            <svg aria-hidden="true"><use href="#icon-moon"/></svg>
          </button>
          <button class="btn btn-ghost btn-sm" id="logoutBtn">Sign Out</button>
        </div>
      </div>

      <div class="toolbar">
        <div class="month-nav">
          <button class="btn btn-ghost btn-sm" id="prevMonth">&lsaquo;</button>
          <span class="month-label" id="monthLabel"></span>
          <button class="btn btn-ghost btn-sm" id="nextMonth">&rsaquo;</button>
        </div>
        <select id="statusFilter" style="width:auto;min-width:140px;">
          <option value="all">All statuses</option>
          <option value="pending">Pending</option>
          <option value="confirmed">Confirmed</option>
          <option value="cancelled">Cancelled</option>
          <option value="completed">Completed</option>
        </select>
        <button class="btn btn-ghost btn-sm" id="refreshBtn">Refresh</button>
      </div>

      <div class="layout">
        <div class="card" style="padding:0;overflow:hidden;">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Time</th>
                <th>Vehicle</th>
                <th>Service</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="bookingsTable">
              <tr><td colspan="5" class="empty">Loading...</td></tr>
            </tbody>
          </table>
        </div>
        <div class="card detail-panel" id="detailPanel">
          <p class="empty" style="padding:1rem;">Select a booking to view details</p>
        </div>
      </div>
    </div>
  </div>
  <script src="js/config.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
