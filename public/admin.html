<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self'; img-src 'self' data:; connect-src 'self' https://detailingsite-production.up.railway.app;" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <title>Admin — 2 The Xtreme Detailing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0a0a0a; --surface: #1a1a1a; --surface-2: #222;
      --red: #cc2020; --red-light: #e02a2a;
      --white: #f5f2ec; --white-dim: #b8b4ac; --white-muted: #6a6762;
      --border: rgba(255,255,255,0.08); --radius: 4px;
      --green: #5ee89a; --yellow: #f0c040; --gray: #888;
    }
    body { background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 0.06em; margin-bottom: 0.25rem; }
    h1 span { color: var(--red); }
    .subtitle { color: var(--white-muted); font-size: 0.85rem; margin-bottom: 2rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; }
    label { display: block; font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--white-muted); margin-bottom: 0.4rem; }
    input, select { width: 100%; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--white); padding: 0.7rem 1rem; font-family: inherit; font-size: 0.9rem; outline: none; }
    input:focus { border-color: var(--red); }
    .btn { background: var(--red); color: var(--white); border: none; border-radius: var(--radius); padding: 0.65rem 1.25rem; font-size: 0.8rem; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; font-family: inherit; font-weight: 500; }
    .btn:hover { background: var(--red-light); }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--white-dim); }
    .btn-ghost:hover { border-color: var(--red); color: var(--white); }
    .btn-sm { padding: 0.4rem 0.75rem; font-size: 0.72rem; }
    .btn-green { background: #2a8a55; }
    .btn-yellow { background: #a07820; }
    .btn-gray { background: #555; }
    .error { color: #ff6b6b; font-size: 0.85rem; margin-top: 0.75rem; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 1rem; align-items: center; margin-bottom: 1.5rem; }
    .toolbar .month-nav { display: flex; align-items: center; gap: 0.75rem; }
    .toolbar .month-label { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 0.05em; min-width: 160px; text-align: center; }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    th { text-align: left; padding: 0.75rem 1rem; font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--white-muted); border-bottom: 1px solid var(--border); }
    td { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); color: var(--white-dim); }
    tr { cursor: pointer; transition: background 0.15s; }
    tr:hover { background: rgba(255,255,255,0.03); }
    tr.selected { background: rgba(204,32,32,0.08); }
    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 2px; font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500; }
    .badge-pending { background: rgba(240,192,64,0.15); color: var(--yellow); }
    .badge-confirmed { background: rgba(94,232,154,0.12); color: var(--green); }
    .badge-cancelled { background: rgba(255,107,107,0.12); color: #ff6b6b; }
    .badge-completed { background: rgba(136,136,136,0.15); color: var(--gray); }
    .layout { display: grid; grid-template-columns: 1fr 340px; gap: 1.5rem; }
    .detail-panel { position: sticky; top: 2rem; }
    .detail-panel h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; margin-bottom: 1rem; }
    .detail-row { margin-bottom: 0.65rem; font-size: 0.85rem; }
    .detail-row strong { color: var(--white); display: block; font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--white-muted); margin-bottom: 0.15rem; }
    .detail-actions { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1.25rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }
    .empty { text-align: center; padding: 3rem; color: var(--white-muted); }
    .login-form { max-width: 400px; margin: 4rem auto; }
    .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .detail-panel { position: static; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="loginView" class="login-form">
      <h1>Admin <span>Dashboard</span></h1>
      <p class="subtitle">2 The Xtreme Detailing — booking management</p>
      <div class="card">
        <label for="apiKey">Admin API Key</label>
        <input type="password" id="apiKey" placeholder="Enter admin key" autocomplete="off" />
        <div class="error" id="loginError" style="display:none;"></div>
        <button class="btn" id="loginBtn" style="margin-top:1rem;width:100%;">Sign In</button>
      </div>
      <p style="margin-top:1rem;text-align:center;"><a href="/" style="color:var(--white-muted);font-size:0.82rem;text-decoration:none;">&larr; Back to site</a></p>
    </div>

    <div id="dashboardView" style="display:none;">
      <div class="header-bar">
        <div>
          <h1>Bookings <span>Admin</span></h1>
          <p class="subtitle" style="margin-bottom:0;">Manage appointments and customer data</p>
        </div>
        <button class="btn btn-ghost btn-sm" id="logoutBtn">Sign Out</button>
      </div>

      <div class="toolbar">
        <div class="month-nav">
          <button class="btn btn-ghost btn-sm" id="prevMonth">&lsaquo;</button>
          <span class="month-label" id="monthLabel"></span>
          <button class="btn btn-ghost btn-sm" id="nextMonth">&rsaquo;</button>
        </div>
        <select id="statusFilter" style="width:auto;min-width:140px;">
          <option value="all">All statuses</option>
          <option value="pending">Pending</option>
          <option value="confirmed">Confirmed</option>
          <option value="cancelled">Cancelled</option>
          <option value="completed">Completed</option>
        </select>
        <button class="btn btn-ghost btn-sm" id="refreshBtn">Refresh</button>
      </div>

      <div class="layout">
        <div class="card" style="padding:0;overflow:hidden;">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Time</th>
                <th>Vehicle</th>
                <th>Service</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="bookingsTable">
              <tr><td colspan="5" class="empty">Loading...</td></tr>
            </tbody>
          </table>
        </div>
        <div class="card detail-panel" id="detailPanel">
          <p class="empty" style="padding:1rem;">Select a booking to view details</p>
        </div>
      </div>
    </div>
  </div>
  <script src="js/config.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
